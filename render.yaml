services:
  - type: web
    name: rag-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVarGroups:
      - rag-app-secrets
    envVars:
      - key: FRONTEND_URL
        value: https://rag-frontend.onrender.com

  - type: web
    name: rag-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://rag-backend.onrender.com
